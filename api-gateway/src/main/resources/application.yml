spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/api-gateway/protocol/openid-connect/certs}

server:
  port: 8080

logging:
  level:
    ROOT: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO