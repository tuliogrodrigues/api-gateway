services:
  api-gateway:
    build: ../api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/api-gateway
    networks:
      - gateway-network
    depends_on:
      user-service:
        condition: service_started
      account-service:
        condition: service_started
      keycloak:
        condition: service_started

  user-service:
    build: ../user-service
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:postgres@postgres:5432/postgres
      - SPRING_R2DBC_USERNAME=postgres
      - SPRING_R2DBC_PASSWORD=postgres
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/api-gateway
    networks:
      - gateway-network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  account-service:
    build: ../account-service
    container_name: account-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/api-gateway
    networks:
      - gateway-network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  postgres_data:

networks:
  gateway-network:
    driver: bridge