spring.application.name=user-service
spring.threads.virtual.enabled=true

server.port=8082

# R2DBC PostgreSQL Configuration
spring.r2dbc.url=r2dbc:postgresql://postgres:postgres@localhost:5432/postgres
spring.r2dbc.username=postgres
spring.r2dbc.password=postgres

# Initialize schema
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Security - JWT/Keycloak (OAuth2 Resource Server)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8180/realms/api-gateway}

# JWT Secret (for login token generation)
jwt.secret=${JWT_SECRET:myVerySecureSecretKeyForJWTTokenGeneration12345}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

logging.level.root=INFO
logging.level.com.tgr.userservice=DEBUG